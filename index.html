<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>奄美観光マップ</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }
    #map {
      width: 100%;
      height: 100vh;
    }
    .controls {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font-size: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      text-decoration: none;
      color: #000;
      display: inline-block;
    }
    .status {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.95);
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 10px 12px;
      max-width: 92%;
      font-size: 12px;
      line-height: 1.4;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>
  <div class="controls">
    <button class="btn" id="locateBtn">📍 現在地を表示</button>
    <a class="btn" id="openSelfBtn" href="#" target="_blank" rel="noopener">↗ 別ページで開く</a>
  </div>

  <div id="map"></div>
  <div class="status" id="status">地図を読み込んでいます…</div>

  <script>
    let map;
    let infoWindow;
    let currentMarker = null;
    let currentCircle = null;

    const spots = [
      {
        lat: 28.387954640773568,
        lng: 129.4853607002732,
        title: "ハブ出没注意（仮）",
        category: "注意",
        description: "ハブの発生情報あり\n通行時に注意してください"
      },
      {
        lat: 28.392135308080416,
        lng: 129.48924318258508,
        title: "観光案内の想定地点",
        category: "案内",
        description: "サンプル地点です"
      },
      {
        lat: 28.3912,
        lng: 129.4877,
        title: "飲食店サンプル",
        category: "飲食",
        description: "クルーズ客歓迎"
      }
    ];

    function markerColor(category) {
      if (category === "飲食") return "#ff7043";
      if (category === "土産") return "#26a69a";
      if (category === "トイレ") return "#42a5f5";
      if (category === "注意") return "#ef5350";
      return "#7e57c2";
    }

    async function initMap() {
      const center = { lat: 28.389, lng: 129.487 };

      map = new google.maps.Map(document.getElementById("map"), {
        center,
        zoom: 15,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: true
      });

      infoWindow = new google.maps.InfoWindow();

      document.getElementById("openSelfBtn").href = window.location.href;

      const bounds = new google.maps.LatLngBounds();

      spots.forEach((spot) => {
        function markerStyle(category) {
  if (category === "飲食店") {
    return { color: "#ff7043", icon: "🍴" };
  }
  if (category === "土産物屋") {
    return { color: "#42a5f5", icon: "🛍️" };
  }
  if (category === "トイレ") {
    return { color: "#29b6f6", icon: "🚻" };
  }
  if (category === "観光案内") {
    return { color: "#7e57c2", icon: "ℹ️" };
  }
  if (category === "注意") {
    return { color: "#ef5350", icon: "⚠️" };
  }
  if (category === "病院") {
    return { color: "#66bb6a", icon: "✚" };
  }
  if (category === "港") {
    return { color: "#3949ab", icon: "⚓" };
  }
  return { color: "#8d6e63", icon: "📍" };
}

const style = markerStyle(spot.category);

const markerEl = document.createElement("div");
markerEl.style.width = "36px";
markerEl.style.height = "36px";
markerEl.style.borderRadius = "50%";
markerEl.style.background = style.color;
markerEl.style.display = "flex";
markerEl.style.alignItems = "center";
markerEl.style.justifyContent = "center";
markerEl.style.color = "#fff";
markerEl.style.fontSize = "18px";
markerEl.style.border = "2px solid white";
markerEl.style.boxShadow = "0 2px 6px rgba(0,0,0,0.25)";
markerEl.textContent = style.icon;

const marker = new google.maps.marker.AdvancedMarkerElement({
  map,
  position: { lat: spot.lat, lng: spot.lng },
  title: spot.title,
  content: markerEl
});

        const navUrl =
          `https://www.google.com/maps/dir/?api=1&origin=Current+Location&destination=${spot.lat},${spot.lng}&travelmode=walking`;

        marker.addListener("click", () => {
          infoWindow.setContent(`
            <div style="max-width:240px;">
              <div style="font-weight:700; margin-bottom:6px;">${spot.title}</div>
              <div style="margin-bottom:6px; color:#666;">カテゴリ：${spot.category}</div>
              <div style="white-space:pre-wrap; margin-bottom:8px;">${spot.description}</div>
              <a href="${navUrl}" target="_blank" rel="noopener">現在地から案内</a>
            </div>
          `);
          infoWindow.open(map, marker);
        });

        bounds.extend(marker.getPosition());
      });

      if (spots.length > 0) {
        map.fitBounds(bounds);
      }

      document.getElementById("status").textContent = "地図を表示しました。";
    }

    document.addEventListener("click", (e) => {
      if (e.target && e.target.id === "locateBtn") {
        const status = document.getElementById("status");

        if (!navigator.geolocation) {
          status.textContent = "この端末は位置情報に対応していません。";
          return;
        }

        status.textContent = "位置情報を取得しています…（許可が出たら「許可」）";

        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const accuracy = pos.coords.accuracy || 0;

            if (currentMarker) currentMarker.setMap(null);
            if (currentCircle) currentCircle.setMap(null);

            currentMarker = new google.maps.Marker({
              position: { lat, lng },
              map,
              title: "現在地",
              icon: {
                path: google.maps.SymbolPath.CIRCLE,
                scale: 10,
                fillColor: "#1a73e8",
                fillOpacity: 1,
                strokeColor: "#ffffff",
                strokeWeight: 2
              }
            });

            currentCircle = new google.maps.Circle({
              strokeColor: "#1a73e8",
              strokeOpacity: 0.8,
              strokeWeight: 1,
              fillColor: "#1a73e8",
              fillOpacity: 0.12,
              map,
              center: { lat, lng },
              radius: accuracy
            });

            map.setCenter({ lat, lng });
            map.setZoom(16);

            status.textContent = `現在地を表示しました（精度目安: 約 ${Math.round(accuracy)}m）`;
          },
          (err) => {
            status.textContent = `位置情報を取得できません：${err.message}`;
          },
          {
            enableHighAccuracy: true,
            timeout: 12000,
            maximumAge: 0
          }
        );
      }
    });
  </script>

  <script
    async
    defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCiCKmzzH7RvOoWiM9BBNONUBbvOWoKShI&libraries=marker&callback=initMap">
  </script>
</body>
</html>
