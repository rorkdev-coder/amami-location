<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>奄美観光マップ</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .controls {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font-size: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      text-decoration: none;
      color: #000;
      display: inline-block;
    }

    .status {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.95);
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 10px 12px;
      max-width: 92%;
      font-size: 12px;
      line-height: 1.4;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="controls">
    <button class="btn" id="locateBtn">📍 現在地を表示</button>
  </div>

  <div id="map"></div>
  <div class="status" id="status">地図を読み込んでいます…</div>

  <!-- GTranslate -->
  <div class="gtranslate_wrapper"></div>

  <script>
    let map;
    let infoWindow;
    let currentMarker = null;
    let currentCircle = null;

    const spots = [
      {
        id: "minami-sushi",
        lat: 28.393219,
        lng: 129.494406,
        title: "美波すし",
        category: "飲食店",
        description: "TEL 0997526367\n営業時間 10:00〜22:00\n定休日 日曜\n決済方法 現金/楽天ペイ\n\nクルーズ客大歓迎"
      },
      {
        id: "kouwan-shokudo",
        lat: 28.389171,
        lng: 129.494046,
        title: "港湾食堂",
        category: "飲食店",
        description: "TEL 0997693130\n営業時間 （平日）11:00〜14:00 17:00〜19:30 （土日）6:00〜14:00 17:00〜19:30\n定休日 日曜\n決済方法 確認中\n\nいつでも来てね"
      },
      {
        id: "amami-museum",
        lat: 28.398404,
        lng: 129.494464,
        title: "奄美博物館",
        category: "観光アトラクション",
        description: "TEL 0997541210\n営業時間 9:00〜17:00\n定休日 第3月曜日、年末年始（12/28～1/1）\n決済方法 確認中\n利用料金 大人310円 高校生・大学生150円 小中学生100円"
      }
    ];

    function markerStyle(category) {
      if (category === "飲食店") return { color: "#ff7043", icon: "🍴" };
      if (category === "お買い物") return { color: "#42a5f5", icon: "🛍️" };
      if (category === "トイレ") return { color: "#29b6f6", icon: "🚻" };
      if (category === "観光案内") return { color: "#7e57c2", icon: "ℹ️" };
      if (category === "観光アトラクション") return { color: "#8e24aa", icon: "⭐" };
      if (category === "注意") return { color: "#ef5350", icon: "⚠️" };
      if (category === "病院") return { color: "#66bb6a", icon: "✚" };
      if (category === "港") return { color: "#3949ab", icon: "⚓" };
      return { color: "#8d6e63", icon: "📍" };
    }

    function createMarkerElement(category) {
      const style = markerStyle(category);

      const markerEl = document.createElement("div");
      markerEl.style.width = "36px";
      markerEl.style.height = "36px";
      markerEl.style.borderRadius = "50%";
      markerEl.style.background = style.color;
      markerEl.style.display = "flex";
      markerEl.style.alignItems = "center";
      markerEl.style.justifyContent = "center";
      markerEl.style.color = "#fff";
      markerEl.style.fontSize = "18px";
      markerEl.style.border = "2px solid white";
      markerEl.style.boxShadow = "0 2px 6px rgba(0,0,0,0.25)";
      markerEl.textContent = style.icon;

      return markerEl;
    }

    function createCurrentLocationElement() {
      const markerEl = document.createElement("div");
      markerEl.style.width = "20px";
      markerEl.style.height = "20px";
      markerEl.style.borderRadius = "50%";
      markerEl.style.background = "#1a73e8";
      markerEl.style.border = "3px solid white";
      markerEl.style.boxShadow = "0 2px 6px rgba(0,0,0,0.25)";
      return markerEl;
    }

    function isEmbedded() {
      return window.self !== window.top;
    }

    function getSpotFromQuery() {
      const params = new URLSearchParams(window.location.search);
      return params.get("spot");
    }

    function shouldAutoOpenCurrentLocation() {
      const params = new URLSearchParams(window.location.search);
      return params.get("showCurrentLocation") === "1";
    }

    function focusSpotIfNeeded() {
      const spotId = getSpotFromQuery();
      if (!spotId) return;

      const target = spots.find(s => s.id === spotId);
      if (!target) return;

      map.setCenter({ lat: target.lat, lng: target.lng });
      map.setZoom(19);
      document.getElementById("status").textContent = `${target.title} を表示しています。`;
    }

    function autoOpenCurrentLocationIfNeeded() {
      if (!shouldAutoOpenCurrentLocation()) return;
      const btn = document.getElementById("locateBtn");
      if (btn) {
        setTimeout(() => btn.click(), 500);
      }
    }

    async function initMap() {
      const center = { lat: 28.389, lng: 129.487 };

      map = new google.maps.Map(document.getElementById("map"), {
        center,
        zoom: 15,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: true,
        mapId: "ef633c769a15ea5f5f112602"
      });

      infoWindow = new google.maps.InfoWindow();

      const bounds = new google.maps.LatLngBounds();

      spots.forEach((spot) => {
        const marker = new google.maps.marker.AdvancedMarkerElement({
          map,
          position: { lat: spot.lat, lng: spot.lng },
          title: spot.title,
          content: createMarkerElement(spot.category)
        });

        const navUrl =
          `https://www.google.com/maps/dir/?api=1&origin=Current+Location&destination=${spot.lat},${spot.lng}&travelmode=walking`;

        marker.addListener("click", () => {
          infoWindow.setContent(`
            <div style="max-width:240px;">
              <div style="font-weight:700; margin-bottom:6px;">${spot.title}</div>
              <div style="margin-bottom:6px; color:#666;">カテゴリ：${spot.category}</div>
              <div style="white-space:pre-wrap; margin-bottom:8px;">${spot.description}</div>
              <a href="${navUrl}" target="_blank" rel="noopener">現在地から案内</a>
            </div>
          `);

          infoWindow.open({
            anchor: marker,
            map
          });
        });

        bounds.extend({ lat: spot.lat, lng: spot.lng });
      });

      if (spots.length > 0 && !getSpotFromQuery()) {
        map.fitBounds(bounds);
      }

      if (getSpotFromQuery()) {
        focusSpotIfNeeded();
      } else {
        document.getElementById("status").textContent = `地図を表示しました。スポット数：${spots.length}`;
      }

      autoOpenCurrentLocationIfNeeded();
    }

    document.addEventListener("click", (e) => {
      if (e.target && e.target.id === "locateBtn") {
        const status = document.getElementById("status");

        if (isEmbedded()) {
          const url = new URL(window.location.href);
          url.searchParams.set("showCurrentLocation", "1");
          window.open(url.toString(), "_blank", "noopener,noreferrer");
          return;
        }

        if (!navigator.geolocation) {
          status.textContent = "この端末は位置情報に対応していません。";
          return;
        }

        status.textContent = "位置情報を取得しています…（許可が出たら「許可」）";

        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const accuracy = pos.coords.accuracy || 0;

            if (currentMarker) currentMarker.map = null;
            if (currentCircle) currentCircle.setMap(null);

            currentMarker = new google.maps.marker.AdvancedMarkerElement({
              map,
              position: { lat, lng },
              title: "現在地",
              content: createCurrentLocationElement()
            });

            currentCircle = new google.maps.Circle({
              strokeColor: "#1a73e8",
              strokeOpacity: 0.8,
              strokeWeight: 1,
              fillColor: "#1a73e8",
              fillOpacity: 0.12,
              map,
              center: { lat, lng },
              radius: accuracy
            });

            map.setCenter({ lat, lng });
            map.setZoom(16);

            status.textContent = `現在地を表示しました（精度目安: 約 ${Math.round(accuracy)}m）`;
          },
          (err) => {
            status.textContent = `位置情報を取得できません：${err.message}`;
          },
          {
            enableHighAccuracy: true,
            timeout: 12000,
            maximumAge: 0
          }
        );
      }
    });
  </script>

  <script>
    window.gtranslateSettings = {
      default_language: "ja",
      native_language_names: true,
      detect_browser_language: true,
      languages: ["ja","en","zh-CN","zh-TW"],
      wrapper_selector: ".gtranslate_wrapper"
    };
  </script>

  <script
    async
    defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC8dHUikjdSAExARQfT8r0yadFN2O5mRFc&libraries=marker&callback=initMap">
  </script>
  <script src="https://cdn.gtranslate.net/widgets/latest/float.js" defer></script>
</body>
</html>
