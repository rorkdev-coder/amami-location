      // ===== 注意 =====
      {

        lng: 129.4853607002732,
        title: "ハブ出没注意（仮）",
        category: "注意",
        description: "ハブの発生情報あり\n通行時に注意してください"

    function markerStyle(category) {
      if (category === "飲食店") return { color: "#ff7043", icon: "🍴" };
      if (category === "お買い物") return { color: "#42a5f5", icon: "🛍️" };
      if (category === "トイレ") return { color: "#29b6f6", icon: "🚻" };
      if (category === "観光案内") return { color: "#7e57c2", icon: "ℹ️" };
      if (category === "観光アトラクション") return { color: "#8e24aa", icon: "⭐" };
      if (category === "注意") return { color: "#ef5350", icon: "⚠️" };
      if (category === "病院") return { color: "#66bb6a", icon: "✚" };
      if (category === "港") return { color: "#3949ab", icon: "⚓" };
      return { color: "#8d6e63", icon: "📍" };
    }

    function createMarkerElement(category) {
      const style = markerStyle(category);

      const markerEl = document.createElement("div");
      markerEl.style.width = "36px";
      markerEl.style.height = "36px";
      markerEl.style.borderRadius = "50%";
      markerEl.style.background = style.color;
      markerEl.style.display = "flex";
      markerEl.style.alignItems = "center";
      markerEl.style.justifyContent = "center";
      markerEl.style.color = "#fff";
      markerEl.style.fontSize = "18px";
      markerEl.style.border = "2px solid white";
      markerEl.style.boxShadow = "0 2px 6px rgba(0,0,0,0.25)";
      markerEl.textContent = style.icon;

      return markerEl;
    }

    // =========================
    // 住所 → 緯度経度（初回のみ）
    // =========================
    const GEO_CACHE_KEY = "amami_geocode_cache_v3";
    const geoCache = (() => {
      try {
        return JSON.parse(localStorage.getItem(GEO_CACHE_KEY) || "{}");
      } catch {
        return {};
      }
    })();

    function saveGeoCache() {
      try {
        localStorage.setItem(GEO_CACHE_KEY, JSON.stringify(geoCache));
      } catch {}
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function geocodeAddress(address) {
      const raw = String(address || "").trim();
      if (!raw) return null;

      const cleaned = raw
        .replace(/〒\s*\d{3}-?\d{4}/g, "")
        .replace(/\s+/g, " ")
        .trim();

      const query = `${cleaned}, Japan`;

      if (geoCache[query]) {
        return geoCache[query];
      }

      const url = "https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" + encodeURIComponent(query);

      await sleep(1100);

      const res = await fetch(url, {
        headers: { "Accept": "application/json" }
      });

      if (!res.ok) return null;

      const json = await res.json();
      if (!json || !json[0]) return null;

      const lat = Number(json[0].lat);
      const lng = Number(json[0].lon);
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;

      geoCache[query] = { lat, lng };
      saveGeoCache();

      return geoCache[query];
    }

    async function normalizeSpots(rawSpots) {
      const result = [];

      for (const spot of rawSpots) {
        if (typeof spot.lat === "number" && typeof spot.lng === "number") {
          result.push(spot);
          continue;
        }

        if (spot.address) {
          const geo = await geocodeAddress(spot.address);
          if (geo) {
            result.push({
              ...spot,
              lat: geo.lat,
              lng: geo.lng
            });
          } else {
            console.warn("geocode failed:", spot.title, spot.address);
          }
        }
      }

      return result;
    }

    async function initMap() {
      const center = { lat: 28.389, lng: 129.487 };

      map = new google.maps.Map(document.getElementById("map"), {
        center,
        zoom: 15,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: true,
        mapId: "ef633c769a15ea5f5f112602"
      });

      infoWindow = new google.maps.InfoWindow();
      document.getElementById("openSelfBtn").href = window.location.href;

      document.getElementById("status").textContent = "スポット情報を読み込んでいます…（初回は少し時間がかかります）";

      const normalizedSpots = await normalizeSpots(spots);
      const bounds = new google.maps.LatLngBounds();

      normalizedSpots.forEach((spot) => {
        const marker = new google.maps.marker.AdvancedMarkerElement({
          map,
          position: { lat: spot.lat, lng: spot.lng },
          title: spot.title,
          content: createMarkerElement(spot.category)
        });

        const navUrl =
          `https://www.google.com/maps/dir/?api=1&origin=Current+Location&destination=${spot.lat},${spot.lng}&travelmode=walking`;

        marker.addListener("click", () => {
          infoWindow.setContent(`
            <div style="max-width:240px;">
              <div style="font-weight:700; margin-bottom:6px;">${spot.title}</div>
              <div style="margin-bottom:6px; color:#666;">カテゴリ：${spot.category}</div>
              <div style="white-space:pre-wrap; margin-bottom:8px;">${spot.description}</div>
              ${spot.address ? `<div style="font-size:12px; color:#666; margin-bottom:8px;">${spot.address}</div>` : ""}
              <a href="${navUrl}" target="_blank" rel="noopener">現在地から案内</a>
            </div>
          `);

          infoWindow.open({
            anchor: marker,
            map
          });
        });

        bounds.extend({ lat: spot.lat, lng: spot.lng });
      });

      if (normalizedSpots.length > 0) {
        map.fitBounds(bounds);
      }

      document.getElementById("status").textContent = `地図を表示しました。スポット数：${normalizedSpots.length}`;
    }

    document.addEventListener("click", (e) => {
      if (e.target && e.target.id === "locateBtn") {
        const status = document.getElementById("status");

        if (!navigator.geolocation) {
          status.textContent = "この端末は位置情報に対応していません。";
          return;
        }

        status.textContent = "位置情報を取得しています…（許可が出たら「許可」）";

        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const accuracy = pos.coords.accuracy || 0;

            if (currentMarker) currentMarker.setMap(null);
            if (currentCircle) currentCircle.setMap(null);

            currentMarker = new google.maps.Marker({
              position: { lat, lng },
              map,
              title: "現在地",
              icon: {
                path: google.maps.SymbolPath.CIRCLE,
                scale: 10,
                fillColor: "#1a73e8",
                fillOpacity: 1,
                strokeColor: "#ffffff",
                strokeWeight: 2
              }
            });

            currentCircle = new google.maps.Circle({
              strokeColor: "#1a73e8",
              strokeOpacity: 0.8,
              strokeWeight: 1,
              fillColor: "#1a73e8",
              fillOpacity: 0.12,
              map,
              center: { lat, lng },
              radius: accuracy
            });

            map.setCenter({ lat, lng });
            map.setZoom(16);

            status.textContent = `現在地を表示しました（精度目安: 約 ${Math.round(accuracy)}m）`;
          },
          (err) => {
            status.textContent = `位置情報を取得できません：${err.message}`;
          },
          {
            enableHighAccuracy: true,
            timeout: 12000,
            maximumAge: 0
          }
        );
      }
    });
  </script>

  <script
