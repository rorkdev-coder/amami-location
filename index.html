<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Current Location Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100vh; width: 100%; }
    .ui { position: absolute; z-index: 9999; left: 12px; top: 12px; display: flex; gap: 8px; }
    .btn { padding: 10px 12px; border: 1px solid #ddd; border-radius: 10px; background: #fff; font-size: 14px; }
    .note { position: absolute; z-index: 9999; left: 12px; bottom: 12px; background: rgba(255,255,255,0.95); padding: 10px 12px; border-radius: 10px; border: 1px solid #eee; font-size: 12px; max-width: 92%; }
  </style>
</head>
<body>
  <div class="ui">
    <button class="btn" id="locateBtn">📍 現在地を表示</button>
    <button class="btn" id="openFullBtn">↗ 全画面で開く</button>
  </div>
  <div id="map"></div>
  <div class="note" id="status">「📍 現在地を表示」を押してください。</div>

  <script>
    const map = L.map('map').setView([28.3, 129.5], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

    let marker = null;
    let circle = null;
    const statusEl = document.getElementById('status');

    document.getElementById('openFullBtn').addEventListener('click', () => {
      window.open(window.location.href, '_blank');
    });

    document.getElementById('locateBtn').addEventListener('click', () => {
      if (!navigator.geolocation) {
        statusEl.textContent = 'この端末は位置情報に対応していません。';
        return;
      }
      statusEl.textContent = '位置情報を取得しています…（許可が出たら「許可」）';

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;
          const acc = pos.coords.accuracy || 0;

          if (marker) marker.remove();
          if (circle) circle.remove();

          marker = L.circleMarker([lat,lng], {
            radius: 8, color: '#1a73e8', fillColor: '#1a73e8', fillOpacity: 0.9, weight: 2
          }).addTo(map);

          circle = L.circle([lat,lng], {
            radius: acc, color: '#1a73e8', fillColor: '#1a73e8', fillOpacity: 0.12, weight: 1
          }).addTo(map);

          map.setView([lat,lng], 16);
          statusEl.textContent = `現在地を表示しました（精度目安: 約 ${Math.round(acc)}m）`;
        },
        (err) => {
          statusEl.textContent = `位置情報を取得できません：${err.message}`;
        },
        { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
      );
    });
  </script>
</body>
</html>
